<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      .header {
        height: 70px;
        font-size: 32px;
        font-weight: 600;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        box-shadow: 0px 10px 10px lightblue;
      }
      .content {
        height: auto;
        width: 80%;
        margin: 20px auto;
        padding: 30px;
        text-align: center;
        font-size: 50px;
        background-color: lightgreen;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="header">A complete TypeScript course</div>
    <div class="content">Fundamentals of TypeScript</div>
  </body>
</html>
